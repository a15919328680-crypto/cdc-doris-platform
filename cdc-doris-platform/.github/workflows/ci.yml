name: CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard

jobs:
  backend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Build Backend
      run: cd cdc-doris-platform/backend && mvn clean package -DskipTests
      working-directory: .
    
    - name: Upload Backend Artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: backend-jar
        path: cdc-doris-platform/backend/target/*.jar
        retention-days: 7
  
  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: cdc-doris-platform/frontend/package-lock.json
    
    - name: Install Dependencies
      run: cd cdc-doris-platform/frontend && npm ci
    
    - name: Build Frontend
      run: cd cdc-doris-platform/frontend && npm run build
      working-directory: .
    
    - name: Upload Frontend Artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: frontend-dist
        path: cdc-doris-platform/frontend/dist/
        retention-days: 7
  
  flink-job-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Build Flink Job
      run: cd cdc-doris-platform/flink-job && mvn clean package
      working-directory: .
    
    - name: Upload Flink Job Artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: flink-job-jar
        path: cdc-doris-platform/flink-job/target/*-jar-with-dependencies.jar
        retention-days: 7
  
  build-all:
    needs: [backend-build, frontend-build, flink-job-build]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check All Artifacts
      run: echo "✅ All builds passed!"
