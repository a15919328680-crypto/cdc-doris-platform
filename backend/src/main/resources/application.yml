server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cdc_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

cdc:
  flink:
    home: /opt/flink
    jar-path: /opt/cdc-doris-job/cdc-doris-job-1.0.0-jar-with-dependencies.jar
    kubernetes:
      image: apache/flink:1.17.0-scala_2.12-java11
      jobmanager-memory: 1G
      taskmanager-memory: 2G
      namespace: cdc-platform
      service-account: flink

logging:
  level:
    com.cdc: DEBUG
    org.apache.flink: INFO
